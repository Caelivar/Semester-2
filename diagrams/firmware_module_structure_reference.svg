<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .layer-title { font: 700 19px 'Segoe UI', Arial, sans-serif; fill: #334155; letter-spacing: .6px; }
      .layer-note { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .box-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .app { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .hw { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .support { fill: #e2e8f0; stroke: #64748b; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .section { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 22; filter: url(#shadow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>

  <text class="title" x="70" y="62">Firmware Module Structure</text>
  <text class="subtitle" x="70" y="92">Arduino Mega 2560 bottle opener control software, written in modular C</text>

  <rect class="section" x="50" y="125" width="1300" height="185" rx="22"/>
  <text class="layer-title" x="80" y="164">APPLICATION LAYER</text>
  <text class="layer-note" x="80" y="187">Configuration, initialization, and high-level control of the system behaviour</text>

  <rect class="app" x="345" y="180" width="260" height="95" rx="16" filter="url(#shadow)"/>
  <text class="box-title" x="382" y="216">main.c</text>
  <text class="box-text" x="382" y="242">Editable configuration</text>
  <text class="box-text" x="382" y="264">System init + loop</text>

  <rect class="app" x="795" y="180" width="260" height="95" rx="16" filter="url(#shadow)"/>
  <text class="box-title" x="832" y="216">app.c</text>
  <text class="box-text" x="832" y="242">High-level control</text>
  <text class="box-text" x="832" y="264">State machine logic</text>

  <path class="line" d="M605 228 C675 228, 725 228, 795 228"/>

  <rect class="section" x="50" y="350" width="1300" height="260" rx="22"/>
  <text class="layer-title" x="80" y="389">HARDWARE INTERFACE LAYER</text>
  <text class="layer-note" x="80" y="412">One module per hardware function</text>

  <rect class="hw" x="100" y="445" width="180" height="95" rx="15" filter="url(#shadow)"/>
  <text class="box-title" x="127" y="480">nextion.c</text>
  <text class="box-text" x="127" y="506">Display events</text>
  <text class="box-text" x="127" y="528">Status updates</text>

  <rect class="hw" x="310" y="445" width="180" height="95" rx="15" filter="url(#shadow)"/>
  <text class="box-title" x="346" y="480">hx711.c</text>
  <text class="box-text" x="346" y="506">Load cell</text>
  <text class="box-text" x="346" y="528">Tare + filter</text>

  <rect class="hw" x="520" y="445" width="180" height="95" rx="15" filter="url(#shadow)"/>
  <text class="box-title" x="552" y="480">button.c</text>
  <text class="box-text" x="552" y="506">Physical stop</text>
  <text class="box-text" x="552" y="528">Debounce</text>

  <rect class="hw" x="730" y="445" width="180" height="95" rx="15" filter="url(#shadow)"/>
  <text class="box-title" x="750" y="480">motor_</text>
  <text class="box-title" x="750" y="505">shield.c</text>
  <text class="box-text" x="750" y="528">Motors A + V</text>

  <rect class="hw" x="940" y="445" width="180" height="95" rx="15" filter="url(#shadow)"/>
  <text class="box-title" x="957" y="480">external_</text>
  <text class="box-title" x="957" y="505">motor.c</text>
  <text class="box-text" x="957" y="528">External motor B</text>

  <rect class="hw" x="1150" y="445" width="180" height="95" rx="15" filter="url(#shadow)"/>
  <text class="box-title" x="1185" y="480">servo.c</text>
  <text class="box-text" x="1185" y="506">Servo pulses</text>
  <text class="box-text" x="1185" y="528">Open / close</text>

  <path class="soft-line" d="M925 275 C925 342, 190 375, 190 445"/>
  <path class="soft-line" d="M925 275 C925 342, 400 375, 400 445"/>
  <path class="soft-line" d="M925 275 C925 342, 610 375, 610 445"/>
  <path class="soft-line" d="M925 275 C925 342, 820 375, 820 445"/>
  <path class="soft-line" d="M925 275 C925 342, 1030 375, 1030 445"/>
  <path class="soft-line" d="M925 275 C925 342, 1240 375, 1240 445"/>

  <rect class="section" x="50" y="650" width="1300" height="170" rx="22"/>
  <text class="layer-title" x="80" y="689">SUPPORT LAYER</text>
  <text class="layer-note" x="80" y="712">Shared timing, communication, ramping, and debug utilities</text>

  <rect class="support" x="170" y="740" width="210" height="65" rx="14" filter="url(#shadow)"/>
  <text class="box-title" x="218" y="778">ramp.c</text>
  <text class="small" x="218" y="797">Smooth PWM acceleration</text>

  <rect class="support" x="430" y="740" width="210" height="65" rx="14" filter="url(#shadow)"/>
  <text class="box-title" x="481" y="778">uart.c</text>
  <text class="small" x="481" y="797">Serial communication</text>

  <rect class="support" x="690" y="740" width="210" height="65" rx="14" filter="url(#shadow)"/>
  <text class="box-title" x="728" y="778">timebase.c</text>
  <text class="small" x="728" y="797">Non-blocking timing</text>

  <rect class="support" x="950" y="740" width="210" height="65" rx="14" filter="url(#shadow)"/>
  <text class="box-title" x="1000" y="778">debug.c</text>
  <text class="small" x="1000" y="797">USB serial logs</text>

  <path class="soft-line" d="M820 540 C820 645, 275 662, 275 740"/>
  <path class="soft-line" d="M190 540 C190 645, 535 662, 535 740"/>
  <path class="soft-line" d="M925 275 C925 620, 795 650, 795 740"/>
  <path class="soft-line" d="M400 540 C400 645, 1055 662, 1055 740"/>

  <text class="subtitle" x="70" y="862">app.c contains the high-level control state machine that coordinates the hardware modules.</text>
</svg>
